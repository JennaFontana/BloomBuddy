<!DOCTYPE html>
<html>
<head>
    <title>My First Website</title>
    <style>
        body {
            background-color: #f4f4f4;
            font-family: Arial;
            text-align: center;
        }

        h1 {
            color: darkblue;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1>Hello, Jenna 👋</h1>
    <p>This is my first website!</p>

    <button onclick="changeText()">Click Me</button>

    <script>
        function changeText() {
            document.querySelector("p").innerText = "You clicked the button!";
        }
    </script>

</body>
</html>
