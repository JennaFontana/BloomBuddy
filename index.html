<!DOCTYPE html>
<html>
<head>
    <title>BloomBuddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="header" style="margin-top: 5rem;"></div>
    <a href="questionair.html" class="setup-btn">Set Up</a>
    <h1>Hello, Welcome</h1>

    <div class="flower">
    <div class="stem"></div>
    <div class="petal p1"></div>
    <div class="petal p2"></div>
    <div class="petal p3"></div>
    <div class="petal p4"></div>
    <div class="petal p5"></div>
    <div class="petal p6"></div>
    <div class="center"></div>
    
</div>

    <button id="generate-btn">Generate Exercise</button>
    <div id="loading-indicator">
        <div class="spinner"></div>
        <span>Consulting the trainer...</span>
    </div>
    <div id="workout-result" style="justify-self: center; margin: 1.5rem; white-space: pre-wrap; max-width: 80%; text-align: left;"></div>

    <script src="scripts/index.js" type="module"></script>

    <!-- Firebase Authentication -->
    <script src="scripts/auth.js" type="module"></script>
    <script src="scripts/flowerJava.js"></script>

</body>
</html>
