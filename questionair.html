<!DOCTYPE html>
<html>
    <head>
        <title>BloomBuddy</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap"
            rel="stylesheet">

        <link rel="stylesheet" href="css/style.css">
        <link rel="stylesheet" href="css/questionair.css">

        <!-- Firebase Authentication -->
        <script src="scripts/auth.js" type="module"></script>
        <script src="scripts/questionair.js" type="module"></script>
    </head>
    <body>
        <div class="header" style="margin-top: 5rem;"></div>
        <div class="container">
            <h2>Fitness Goals</h2>
            <p>What are your fitness goals? (e.g., lose weight, build muscle)</p>
            <label class="option-group" for="lose-weight">
                <input type="checkbox" id="lose-weight" name="goal" value="Lose Weight">
                <span>Lose Weight</span>
            </label>
            <label class="option-group" for="build-muscle">
                <input type="checkbox" id="build-muscle" name="goal" value="Build Muscle">
                <span>Build Muscle</span>
            </label>
            <label class="option-group" for="improve-endurance">
                <input type="checkbox" id="improve-endurance" name="goal" value="Improve Endurance">
                <span>Improve Endurance</span>
            </label>
            <label class="option-group" for="other-goal">
                <input type="checkbox" id="other-goal" name="goal" value="Other">
                <span>Other</span>
            </label>
            <input type="text" id="other-goal-field" placeholder="Other Goal">
        </div>
        <div class="container">
            <h2>Physical Limitations</h2>
            <p>What conditions may limit your ability to exercise? (Select all
                that apply)</p>

            <label class="option-group" for="Hypertension">
                <input type="checkbox" id="Hypertension" name="Hypertension">
                <span>Hypertension</span>
            </label>
            <label class="option-group" for="Obesity">
                <input type="checkbox" id="Obesity" name="Obesity">
                <span>Obesity</span>
            </label>
            <label class="option-group" for="Diabetes">
                <input type="checkbox" id="Diabetes" name="Diabetes">
                <span>Diabetes</span>
            </label>
            <label class="option-group" for="Arthritis">
                <input type="checkbox" id="Arthritis"
                    name="Arthritis/Chronic Pain">
                <span>Arthritis/Chronic Pain</span>
            </label>
            <label class="option-group" for="other">
                <input type="checkbox" id="other" name="Other">
                <span>Other</span>
            </label>
            <input type="text" id="other-field" placeholder="Other Conditions">
        </div>
        <button id="save-btn">Save Conditions</button>
        <div id="loading-indicator">
            <div class="spinner"></div>
            <span>Creating your plan...</span>
        </div>
    </body>
</html>
