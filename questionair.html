<!DOCTYPE html>
<html>
    <head>
        <title>BloomBuddy</title>
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="questionair.css">
        <script src="script.js"></script>
    </head>
    <body>
        <div class="checklist">
            <h2>Physical Limitations</h2>
            <p>What conditions may limit your ability to exercise? (Select all that apply)</p>
            <ul>
                <li><input type="checkbox" name="Hypertension">Hypertension</input></li>
                <li><input type="checkbox" name="Obesity">Obesity</input></li>
                <li><input type="checkbox" name="Diabetes">Diabetes</input></li>
                <li><input type="checkbox" name="Arthritis/Chronic Pain">Arthritis/Chronic Pain</input></li>
                <li><input type="checkbox" name="Other">Other</input></li>
            </ul>
        </div>
    </body>
</html>
