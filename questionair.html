<!DOCTYPE html>
<html>
    <head>
        
        <title>BloomBuddy</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="questionair.css">

        <script src="script.js"></script>
    </head>
    <body>
        <div class="checklist">
            <h2>Physical Limitations</h2>
            <p>What conditions may limit your ability to exercise? (Select all that apply)</p>
            <ul>
                <li><h3><input type="checkbox" name="Hypertension">Hypertension</input></h3></li>
                <li><h3><input type="checkbox" name="Obesity">Obesity</input></h3></li>
                <li><h3><input type="checkbox" name="Diabetes">Diabetes</input></h3></li>
                <li><h3><input type="checkbox" name="Arthritis/Chronic Pain">Arthritis/Chronic Pain</input></h3></li>
                <li><h3><input type="checkbox" name="Other">Other</input></h3></li>
            </ul>
        </div>
    </body>
</html>
