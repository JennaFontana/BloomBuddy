<!DOCTYPE html>
<html>
<head>
    <title>BloomBuddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chiron+GoRound+TC:wght@200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        #workout-result ul {
            padding-left: 20px;
        }
        #workout-result li {
            margin-bottom: 10px;
        }
    </style>
</head>
    <body>
        <div class="header" style="margin-top: 1rem;"></div>
        <a href="questionair.html" class="setup-btn">Set Up</a>
        <h1 style="font-size: 2.5rem">Bloom Buddy</h1>
        <h2 style="width: 70vw; justify-self: center;">
            Your health and wellness companion!<br>
            Click setup to adjust you constraints and goals.
        </h2>

        <div class="flower">
            <div class="stem"></div>
            <div class="petal p1"></div>
            <div class="petal p2"></div>
            <div class="petal p3"></div>
            <div class="petal p4"></div>
            <div class="petal p5"></div>
            <div class="petal p6"></div>
            <div class="center"></div>
        </div>
        <button id="generate-btn">Generate Exercise</button>
        <div id="loading-indicator">
            <div class="spinner"></div>
            <span>Generating Plan...</span>
        </div>
        <div id="workout-result" style="justify-self: center; margin: 1.5rem; max-width: 80%; text-align: left;"></div>

        <script src="scripts/auth.js" type="module"></script>
        <script src="scripts/flowerJava.js"></script>
        <script src="scripts/index.js" type="module"></script>
    </body>
</html>
